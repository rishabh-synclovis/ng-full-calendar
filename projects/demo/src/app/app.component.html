<div class="demo-shell">
  <div class="demo-controls">
    <label>
      <input type="checkbox" [(ngModel)]="showSidebar" />
      Show sidebar
    </label>

    <label>
      Font size
      <input type="range" min="10" max="24" [(ngModel)]="fontSize" />
      {{ fontSize }}px
    </label>

    <label>
      <input type="checkbox" [(ngModel)]="useApiData" (ngModelChange)="onDataSourceChange()" />
      Use real API event shape (hex colors, custom multi-day)
    </label>

    <label>
      <input type="checkbox" [(ngModel)]="customClickMode" />
      Custom click handling (disables built-in popup)
    </label>

    <label>
      <input type="checkbox" [(ngModel)]="useFrenchLocale" />
      French weekday/month names
    </label>

    <label>
      Time format
      <select [(ngModel)]="timeFormat">
        <option value="12h">12h</option>
        <option value="24h">24h</option>
      </select>
    </label>

    @if (customClickMode && lastCustomClick) {
      <span class="demo-click-log">{{ lastCustomClick }}</span>
    }
  </div>

  <main class="demo-main">
    <ngfc-calendar
      [events]="events"
      [categories]="useApiData ? null : categories"
      [showSidebar]="showSidebar"
      [fontSize]="fontSize"
      [locale]="locale"
      view="month"
      [editable]="!customClickMode"
      (navigate)="onNavigate($event)"
      (eventsChange)="onEventsChange($event)"
      (dayClick)="onCustomDayClick($event)"
      (slotClick)="onCustomSlotClick($event)"
      (eventClick)="onCustomEventClick($event)"
    ></ngfc-calendar>
  </main>
</div>
